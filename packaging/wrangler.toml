name = "getresearcher-installer"
main = "cloudflare-worker.js"
compatibility_date = "2024-01-01"

# Disable the default .workers.dev route — only serve via the custom domain.
workers_dev = false

# Custom domain: a single `wrangler deploy` creates the Worker AND the proxied
# DNS record + cert, standing up https://getresearcher.auspexai.network/.
# (getworker uses a plain [[routes]] pattern + a pre-existing DNS record; this
# custom_domain form is the one-command equivalent — align getworker later.)
[[routes]]
pattern = "getresearcher.auspexai.network"
zone_name = "auspexai.network"
custom_domain = true

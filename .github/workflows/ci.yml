name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  metadata:
    name: Verify repo metadata
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Verify LICENSE is Apache-2.0
        run: |
          test -f LICENSE
          head -3 LICENSE | grep -q "Apache License"
      - name: Verify README exists
        run: test -f README.md

  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # auspexai-tenant is not on PyPI yet (publish deferred); install it from
          # the sibling repo so the editable install below can resolve it. Once the
          # SDK is published this line is dropped and the plain dependency resolves.
          pip install "auspexai-tenant @ git+https://github.com/auspexai/tenant-sdk.git@main"
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Format check
        run: ruff format --check src tests
      - name: Test
        run: pytest

  frontend:
    name: Frontend (svelte-check + build)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Check
        run: pnpm run check
      - name: Build
        run: pnpm run build

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  metadata:
    name: Verify repo metadata
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Verify LICENSE is Apache-2.0
        run: |
          test -f LICENSE
          head -3 LICENSE | grep -q "Apache License"
      - name: Verify README exists
        run: test -f README.md

  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # auspexai-tenant resolves from PyPI (published 2026-06-12, trusted
          # publishing) — CI tests against the released SDK, matching what a
          # researcher installs.
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Format check
        run: ruff format --check src tests
      - name: Test
        run: pytest

  frontend:
    name: Frontend (svelte-check + build)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.4
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Check
        run: pnpm run check
      - name: Build
        run: pnpm run build
